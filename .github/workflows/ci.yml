name: FromFarm CI/CD

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Build & Test (Next.js + Prisma)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: fromfarm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/fromfarm_test

      - name: Lint
        run: npm run lint

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/fromfarm_test
          JWT_SECRET: fromfarm-test-secret-ci
          NEXTAUTH_SECRET: fromfarm-nextauth-secret-ci
          NEXTAUTH_URL: http://localhost:3000
          NODE_ENV: production