name: FromFarm CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://testuser:testpass@localhost:5432/fromfarm_test
  JWT_SECRET: fromfarm-test-secret-key-ci
  NEXTAUTH_SECRET: fromfarm-nextauth-secret-ci
  NEXTAUTH_URL: http://localhost:3000
  NODE_ENV: test

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Install, Lint, TypeScript Check
  # ─────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────
  # JOB 2: Test dengan PostgreSQL
  # ─────────────────────────────────────────
  test:
    name: Test + Prisma Migrate
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: fromfarm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Seed database (data awal Goal, Role, dll)
        run: npx prisma db seed
        continue-on-error: true  # opsional jika seed belum siap

      - name: Run tests
        run: npm test -- --forceExit --detectOpenHandles
        # env:
        #   DATABASE_URL: ${{ env.DATABASE_URL }}
        #   JWT_SECRET: ${{ env.JWT_SECRET }}

  # ─────────────────────────────────────────
  # JOB 3: Build Next.js
  # ─────────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build aplikasi
        run: npm run build
        # env:
        #   DATABASE_URL: ${{ secrets.DATABASE_URL }}
        #   JWT_SECRET: ${{ secrets.JWT_SECRET }}
        #   NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
        #   NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        #   NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 4: Deploy (hanya branch main)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy ke Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      
