name: FromFarm CI

on:
  push:
    branches: [main, develop, 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Build & Test (Next.js + Prisma)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/fromfarm_test
      JWT_SECRET: fromfarm-test-secret-ci
      NEXTAUTH_SECRET: fromfarm-nextauth-secret-ci
      NEXTAUTH_URL: http://localhost:3000

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: fromfarm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('next.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run seed

      - name: Lint
        run: npm run lint

      - name: Build Next.js
        run: npm run build

      - name: Smoke test authenticated API
        run: npm run smoke:ci