name: FromFarm CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        # env:
        #   NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}


  backend:
    name: Backend CI (Express + Prisma)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: fromfarm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/fromfarm_test

      - name: Seed data awal (Goal, dll)
        run: npx prisma db seed
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/fromfarm_test

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm test -- --forceExit --detectOpenHandles
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/fromfarm_test
          JWT_SECRET: fromfarm-test-secret-ci
          NODE_ENV: test


  deploy:
    name: Deploy ke Server
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # ── Deploy Backend ke VPS ──
      - name: Deploy Backend
        uses: appleboy/ssh-action@v1
        with:
        #   host: ${{ secrets.VPS_HOST }}
        #   username: ${{ secrets.VPS_USER }}
        #   key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/fromfarm/backend
            git pull origin main
            npm ci --omit=dev
            npx prisma generate
            npx prisma migrate deploy
            pm2 restart fromfarm-backend --update-env \
              || pm2 start src/index.js --name "fromfarm-backend"
            echo "✅ Backend deployed"


    #   - name: Deploy Frontend ke Vercel
    #     uses: amondnet/vercel-action@v25
    #     with:
    #       vercel-token: ${{ secrets.VERCEL_TOKEN }}
    #       vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
    #       vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
    #       vercel-args: '--prod'
    #       working-directory: frontend